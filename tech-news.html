        .glass-modal {

            top: 0;

        .toast-msg {

            0% {

                opacity: 0;

</head>

                image: "news-pic/meta.jpg",
                fullTextFa: `شرکت Meta اعلام کرد که اپلیکیشن ورزشی واقعیت مجازی Supernatural به جای تعطیلی کامل، به یک شرکت مستقل جدید منتقل خواهد شد.

                fullTextEn: `Meta has announced that the virtual reality fitness app Supernatural will not be shut down but instead transferred to a new independent company.

        let currentLang = 'fa';

        function showToast(msg) {
            let existing = document.querySelector('.toast-msg');
            if (existing) existing.remove();
            let toast = document.createElement('div');
            toast.className = 'toast-msg';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function renderNews() {
            const grid = document.getElementById('newsGrid');
            if (!grid) return;
            grid.innerHTML = newsData.map(news => {
                const title = currentLang === 'fa' ? news.titleFa : news.titleEn;
                return `
                <div class="news-card" data-id="${news.id}">
                    <img class="news-img" src="${news.image}" alt="${title}" onerror="this.src='https://placehold.co/600x400?text=News+Image'">
                    <div class="news-content">
                        <div class="news-title">${title}</div>
                        <div class="news-meta">
                            <div class="admin-info">
                                <img class="admin-avatar" src="images/Khamoosh.jpg" alt="admin" onerror="this.src='https://placehold.co/32x32?text=SK'">
                                <span>${currentLang === 'fa' ? 'سرفراز خموش' : 'Sarfraz Khamoosh'}</span>
                            </div>
                            <span>📅 ${news.date}</span>
                        </div>
                    </div>
                </div>
            `;
            }).join('');

            document.querySelectorAll('.news-card').forEach(card => {
                card.addEventListener('click', () => {
                    const id = parseInt(card.getAttribute('data-id'));
                    const news = newsData.find(n => n.id === id);
                    if (news) openNewsModal(news);
                });
            });
        }

        function openNewsModal(news) {
            const modal = document.getElementById('newsModal');
            const modalContentDiv = document.getElementById('modalContent');
            const title = currentLang === 'fa' ? news.titleFa : news.titleEn;
            const fullText = currentLang === 'fa' ? news.fullTextFa : news.fullTextEn;
            modalContentDiv.innerHTML = `
            <h2 class="modal-title">${title}</h2>
            <div class="modal-meta">
                <div class="admin-info">
                    <img class="admin-avatar" src="images/Khamoosh.jpg" alt="admin" onerror="this.src='https://placehold.co/32x32?text=SK'">
                    <span>${currentLang === 'fa' ? 'سرفراز خموش' : 'Sarfraz Khamoosh'}</span>
                </div>
                <span>📅 ${news.date}</span>
            </div>
            <div class="modal-content-text">${fullText.replace(/\n/g, '<br>')}</div>
        `;
            modal.style.display = 'flex';
        }

        function closeNewsModal() {
            document.getElementById('newsModal').style.display = 'none';
        }

        function updateUI() {
            renderNews();
            document.querySelectorAll('.nav-menu a').forEach(link => {
                const span = link.querySelector('span');
                if (span) {
                    span.innerText = currentLang === 'fa' ? link.getAttribute('data-fa') : link.getAttribute('data-en');
                }
            });
            const tag = document.querySelector('.site-tag');
            if (tag) tag.innerText = currentLang === 'fa' ? tag.getAttribute('data-fa') : tag.getAttribute('data-en');
            const footerCopy = document.getElementById('footerCopy');
            if (footerCopy) footerCopy.innerHTML = currentLang === 'fa' ? '© 2026 سرفراز خموش | تمام حقوق محفوظ است' : '© 2026 Sarfraz Khamoosh | All Rights Reserved';
            const langLabel = document.getElementById('currentLangLabel');
            if (langLabel) langLabel.innerText = currentLang === 'fa' ? 'فارسی' : 'English';
        }

        function setLanguage(lang) {
            currentLang = lang;
            updateUI();
            localStorage.setItem('sarfraz_lang', lang);
        }

        function initTheme() {
            const saved = localStorage.getItem('sarfraz_theme');
            const body = document.body;
            const themeIcon = document.getElementById('themeIcon');
            if (saved === 'dark') {
                body.classList.add('dark');
                themeIcon.src = 'images/day.png';
            } else {
                body.classList.remove('dark');
                themeIcon.src = 'images/night.png';
            }
        }
        function toggleTheme() {
            const body = document.body;
            const themeIcon = document.getElementById('themeIcon');
            if (body.classList.contains('dark')) {
                body.classList.remove('dark');
                themeIcon.src = 'images/night.png';
                localStorage.setItem('sarfraz_theme', 'light');
            } else {
                body.classList.add('dark');
                themeIcon.src = 'images/day.png';
                localStorage.setItem('sarfraz_theme', 'dark');
            }
        }

        function initMobileMenu() {
            const hamburger = document.getElementById('hamburgerBtn');
            const navMenu = document.getElementById('navMenu');
            if (!hamburger || !navMenu) return;
            hamburger.addEventListener('click', (e) => {
                e.stopPropagation();
                navMenu.classList.toggle('open');
            });
            document.addEventListener('click', (e) => {
                if (!navMenu.contains(e.target) && !hamburger.contains(e.target)) {
                    navMenu.classList.remove('open');
                }
            });
            navMenu.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => navMenu.classList.remove('open'));
            });
        }

        function initLanguage() {
            const selector = document.getElementById('langSelector');
            const btn = document.getElementById('langBtn');
            if (!selector || !btn) return;
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                selector.classList.toggle('open');
            });
            document.addEventListener('click', (e) => {
                if (!selector.contains(e.target)) selector.classList.remove('open');
            });
            document.querySelectorAll('.lang-option').forEach(opt => {
                opt.addEventListener('click', () => {
                    const lang = opt.getAttribute('data-lang');
                    if (lang) setLanguage(lang);
                    selector.classList.remove('open');
                });
            });
        }

        // مودال UID
        const modalUid = document.getElementById('uidModal');
        const codmBtn = document.getElementById('codmBtn');
        const copyUidBtn = document.getElementById('copyUidBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        function openUidModal() { modalUid.style.display = 'flex'; }
        function closeUidModal() { modalUid.style.display = 'none'; }
        function copyUid() {
            navigator.clipboard.writeText('7500139701825634305');
            showToast(currentLang === 'fa' ? '✅ UID کپی شد!' : '✅ UID copied!');
            closeUidModal();
        }
        if (codmBtn) codmBtn.addEventListener('click', openUidModal);
        if (copyUidBtn) copyUidBtn.addEventListener('click', copyUid);
        if (closeModalBtn) closeModalBtn.addEventListener('click', closeUidModal);
        if (modalUid) modalUid.addEventListener('click', (e) => { if (e.target === modalUid) closeUidModal(); });

        document.getElementById('modalCloseBtn').addEventListener('click', closeNewsModal);
        document.getElementById('newsModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('newsModal')) closeNewsModal();
        });

        document.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('sarfraz_lang') || 'fa';
            currentLang = savedLang;
            renderNews();
            updateUI();
            initTheme();
            initMobileMenu();
            initLanguage();
            document.getElementById('themeBtn').addEventListener('click', toggleTheme);
        });
    </script>
</body>

</html>
